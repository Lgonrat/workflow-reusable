name: Linter IA
description: Linter IA

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  linter-ia:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get changed files
        id: diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD > diff.txt
