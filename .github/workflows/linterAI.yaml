name: Linter IA
description: Linter IA

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  linter-ia:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD > diff.txt

      - name: Set up Node.js environment
        uses: actions/setup-node@v4

      - name: Set up Copilot CLI
        uses: actions/setup-copilot@v0.0.5

      - name: Run Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          copilot -p "Analiza los siguientes cambios en la PR y resume las modificaciones, entradas nuevas, cambios de versión y pasos relevantes:\n$(cat diff.txt)" --allow-tool='shell(git:*)' --allow-tool=write --no-ask-user
          mv copilot.md linter-summary.md

      - name: Publicar comentario en la PR
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const resumen = fs.readFileSync('linter-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Resumen Linter IA:**\n\n${resumen}`
            });

      - name: Subir artefacto de resumen
        uses: actions/upload-artifact@v4
        with:
          name: linter-summary
          path: linter-summary.md
          retention-days: 1
