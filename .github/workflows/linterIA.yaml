name: Linter IA
description: Analiza cambios en una PR y genera resumen IA

on:
  workflow_call:
    inputs:
      BASE_BRANCH:
        description: 'Rama base contra la que comparar'
        type: string
        required: false
        default: 'main'
      PROMPT:
        description: 'Prompt personalizado para GitHub Copilot'
        type: string
        required: false
        default: 'Analiza los cambios y resume entradas nuevas, cambios de versión y validaciones necesarias'
    outputs:
      summary_output_file:
        description: 'Path del resumen generado'
        value: ${{ jobs.linter_ia.outputs.summary_output_file }}

permissions:
  contents: read
  pull-requests: write

jobs:
  linter_ia:
    runs-on: ubuntu-latest
    outputs:
      summary_output_file: ${{ steps.save-summary.outputs.summary_output_file }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: diff
        run: |
          git fetch origin ${{ inputs.BASE_BRANCH }}
          git diff origin/${{ inputs.BASE_BRANCH }}...HEAD > diff.txt

      - name: Set up Node.js environment
        uses: actions/setup-node@v4

      - name: Set up Copilot CLI
        uses: actions/setup-copilot@v0.0.5

      - name: Run Copilot CLI
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          copilot -p "${{ inputs.PROMPT }}\n$(cat diff.txt)" \
            --allow-tool='shell(git:*)' \
            --allow-tool=write \
            --no-ask-user
          mv copilot.md linter-summary.md

      - name: Publicar comentario en la PR
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const resumen = fs.readFileSync('linter-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Resumen Linter IA:**\n\n${resumen}`
            });

      - name: Guardar output de summary
        id: save-summary
        run: echo "summary_output_file=linter-summary.md" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linter-summary
          path: linter-summary.md
          retention-days: 1
