name: Linter IA
description: Analiza cambios en una PR y genera resumen IA (sin Copilot)

on:
  workflow_call:
    inputs:
      DIFF_CONTENT:
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  linter_ia:
    runs-on: ubuntu-latest
    outputs:
      summary_output_file: ${{ steps.save-summary.outputs.summary_output_file }}

    steps:

      - name: Crear resumen sin IA
        run: |
          echo "Resumen generado sin Copilot." > linter-summary.md
          echo "" >> linter-summary.md
          echo "=== CAMBIOS DETECTADOS ===" >> linter-summary.md
          echo "" >> linter-summary.md
          echo "${{ inputs.DIFF_CONTENT }}" >> linter-summary.md

      - name: Comentar resumen en la PR
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const resumen = fs.readFileSync('linter-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Resumen Linter IA (modo sin IA)**\n\n${resumen}`
            });

      - name: Guardar output de summary
        id: save-summary
        run: echo "summary_output_file=linter-summary.md" >> $GITHUB_OUTPUT

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: linter-summary
          path: linter-summary.md
