name: 'Linter IA'
description: 'Analiza cambios en una PR y genera un resumen IA con Copilot'

on:
  pull_request:
  workflow_call:
    inputs:
      BASE_BRANCH:
        description: 'Rama base contra la que comparar'
        type: string
        required: false
        default: 'main'

permissions:
  contents: read
  pull-requests: write

jobs:
  linter_ia:
    name: Linter IA
    runs-on: ubuntu-latest
    outputs:
      summary: ${{ steps.generate-summary.outputs.summary }}
      summary_output_file: linter-summary.md

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Fetch base branch
        run: git fetch origin ${{ inputs.BASE_BRANCH }}

      - name: Generate diff
        run: git diff origin/${{ inputs.BASE_BRANCH }}...HEAD > diff.txt

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0

      - name: Setup Copilot CLI
        uses: actions/setup-copilot@v0.0.5

      - name: Generate summary with Copilot
        id: generate-summary
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          DIFF_CONTENT="$(cat diff.txt)"
      
          copilot prompt \
            --prompt "Eres un analista. Resume este diff de una PR en lenguaje natural, explica el impacto y posibles riesgos:\n\n${DIFF_CONTENT}" \
            > linter-summary.md
      
          SUMMARY=$(cat linter-summary.md)
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Publicar comentario en la PR
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const contenido = fs.readFileSync('linter-summary.md', 'utf8');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Resumen IA de los cambios:**\n\n${contenido}`
            });

      - name: Upload summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: linter-summary
          path: linter-summary.md
