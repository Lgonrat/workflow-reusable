name: Linter IA
description: Analiza cambios en una PR y genera resumen IA

on:
  workflow_call:
    inputs:
      BASE_BRANCH:
        description: 'Rama base contra la que comparar'
        type: string
        required: false
        default: 'main'

permissions:
  contents: read
  pull-requests: write

jobs:
  linter_ia:
    runs-on: ubuntu-latest
    outputs:
      summary_output_file: ${{ steps.save-summary.outputs.summary_output_file }}

    steps:

      - name: Checkout PR merge ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Get changed files
        id: diff
        run: |
          git fetch origin ${{ inputs.BASE_BRANCH }}
          git diff origin/${{ inputs.BASE_BRANCH }}...HEAD > diff.txt

      - name: Crear resumen sin IA
        run: |
          echo "Resumen generado sin Copilot." > linter-summary.md
          echo "" >> linter-summary.md
          echo "=== CAMBIOS DETECTADOS ===" >> linter-summary.md
          cat diff.txt >> linter-summary.md

      - name: Publicar comentario en la PR
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const contenido = fs.readFileSync('linter-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🤖 **Resumen Linter IA:**\n\n${contenido}`
            });

      - name: Guardar output de summary
        id: save-summary
        run: echo "summary_output_file=linter-summary.md" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linter-summary
          path: linter-summary.md
